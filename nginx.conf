# ==============================================================================
# KONFIGURASI NGINX SERVER BLOCK (VIRTUAL HOST) UNTUK LARAVEL
# ==============================================================================
# File ini merupakan referensi konfigurasi Nginx untuk aplikasi Laravel Anda
# (Portal Magang Skripsi). Anda dapat menyalin atau mengintegrasikan isi file ini
# ke dalam konfigurasi server Nginx Anda (misal: di /etc/nginx/sites-available/
# untuk Linux/VPS, atau folder conf/sites-enabled/ pada Nginx Windows / Laragon).
# ==============================================================================

server {
    # 1. Port & Nama Domain / Host
    listen 80;
    listen [::]:80;
    server_name localhost portal-magang.test www.portal-magang.test;

    # 2. Root Directory (WAJIB diarahkan ke folder /public Laravel)
    # Sesuaikan path ini dengan lokasi project Anda di server:
    # - Contoh Windows (Nginx Standalone): root "c:/EnvKit/aplikasi-magang-skripsi/public";
    # - Contoh Linux / VPS             : root /var/www/aplikasi-magang-skripsi/public;
    root "c:/EnvKit/aplikasi-magang-skripsi/public";

    # 3. File Index Utama
    index index.php index.html index.htm;

    # 4. Pengaturan Karakter & Header
    charset utf-8;

    # 5. Routing Utama Laravel (Pengganti .htaccess Apache)
    # Semua request yang bukan file/folder statis akan diarahkan ke index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 6. Optimasi Akses Favicon & Robots.txt
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # 7. Penanganan Halaman Error 404
    error_page 404 /index.php;

    # 8. Konfigurasi PHP-FPM / FastCGI (Eksekusi script PHP)
    location ~ \.php$ {
        # Pastikan alamat fastcgi_pass sesuai dengan PHP-FPM Anda:
        # - Windows / Laragon / XAMPP : 127.0.0.1:9000
        # - Linux / Ubuntu VPS         : unix:/var/run/php/php8.2-fpm.sock (sesuaikan versi PHP)
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        
        # Meneruskan parameter script ke FastCGI
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Keamanan tambahan: menyembunyikan versi PHP
        fastcgi_hide_header X-Powered-By;
        
        # Buffer settings untuk menangani response besar (misal saat export PDF)
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # 9. Keamanan: Blokir Akses ke File Tersembunyi (.env, .git, .htaccess, dll)
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 10. Optimasi Caching untuk Asset Statis (Gambar, CSS, JS, Font)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|pdf)$ {
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }
}
